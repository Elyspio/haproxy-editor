global
        log 127.0.0.1:514 local0
        chroot /var/lib/haproxy
        stats socket /run/haproxy/admin.sock mode 660 level admin
        stats timeout 30s
        user haproxy
        group haproxy
        daemon

        # Default SSL material locations
        ca-base /etc/ssl/certs
        crt-base /etc/ssl/private

        # See: https://ssl-config.mozilla.org/#server=haproxy&server-version=2.0.3&config=intermediate
        ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
        ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
        ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
        log     global
        mode    http
        option  httplog
        timeout connect 5000
        timeout client  50000
        timeout server  50000
        errorfile 400 /etc/haproxy/errors/400.http
        errorfile 403 /etc/haproxy/errors/403.http
        errorfile 408 /etc/haproxy/errors/408.http
        errorfile 500 /etc/haproxy/errors/500.http
        errorfile 502 /etc/haproxy/errors/502.http
        errorfile 503 /etc/haproxy/errors/503.http
        errorfile 504 /etc/haproxy/errors/504.http




frontend https
        bind *:443 ssl crt /etc/ssl/elyspio.fr/elyspio.fr.pem


    # Inject the original client scheme & host
        http-request set-header X-Forwarded-Proto https if { ssl_fc }
        http-request set-header X-Forwarded-Host  %[req.hdr(host)]


        acl home-assistant-acl hdr(host) -i ha.elyspio.fr
        use_backend home-assistant if home-assistant-acl

        acl affine-acl hdr(host) -i affine.elyspio.fr
        use_backend affine if affine-acl

        acl pgadmin-acl hdr(host) -i pgadmin.elyspio.fr
        use_backend kube if pgadmin-acl 

        acl auth-acl hdr(host) -i auth.elyspio.fr
        use_backend kube if auth-acl 


        acl freebox-acl hdr(host) -i freebox.elyspio.fr
        use_backend freebox if freebox-acl

backend certbot
        server certbot 127.0.0.1:8080

backend redirect-to-https
        http-request redirect scheme https code 301

backend home-assistant
        server home-assistant 192.168.0.12:8123 check

backend proxmox
        server promox 192.168.0.30:8006 check

backend affine
        server affine-01 elyserv.elylan:3010 check

backend kube
        server kube-node-01 kube-node-01.elylan:8080 check
        server kube-node-02 kube-node-02.elylan:8080 check
        server kube-node-03 kube-node-03.elylan:8080 check

backend freebox
        http-request replace-header Host .* mafreebox.freebox.fr
        server freebox 192.168.0.254:80 check